<h2>{{ username }}'s profile</h2>

<!-- ✅ Mini Navbar Tabs -->
<mat-tab-group>
  <!-- My Orders Tab -->
  <mat-tab label="My Orders">
    <div class="orders-container">
      <p>Order history will go here...</p>
    </div>
  </mat-tab>

  <!-- My Shops Tab -->
   
  <mat-tab label="My Shops">
    <div class="shops-container">
      <div class="shop-grid">
        <!-- ✅ Show all shops -->
        <div class="shop-card" *ngFor="let shop of shops">
          <mat-card>
            <div (click)="goToShop(shop.id)" style="cursor: pointer;">
              <img *ngIf="shop.logoBase64; else defaultImage" [src]="shop.logoBase64"  alt="Shop Logo" class="shop-logo" />
              <ng-template #defaultImage>
                <img src="assets/shop.png" alt="Shop Logo" class="shop-logo" />
              </ng-template>
              <mat-card-title>{{ shop.name }}</mat-card-title>
              <mat-card-subtitle>{{ shop.description }}</mat-card-subtitle>
            </div>
            <button mat-button color="warn" (click)="deleteShop(shop.id)">Delete</button>
          </mat-card>
        </div>

        <!-- button to add a new shop -->
        <div class="shop-card">
          <mat-card class="add-shop-card" (click)="openShopDialog()">
            <mat-icon>add</mat-icon>
            <p>Add New Shop</p>
          </mat-card>
        </div>
      </div>
    </div>
  </mat-tab>
</mat-tab-group>
