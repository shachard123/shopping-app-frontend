<div class="shop-details-container" *ngIf="shop">
  <!-- ✅ Shop Logo -->
  <img
    [src]="shop.logoBase64 ? shop.logoBase64 : 'assets/default-shop.png'"
    alt="Shop Logo"
    class="shop-logo"
  />

  <h2>{{ shop.name }}</h2>
  <p><strong>Description:</strong> {{ shop.description }}</p>
  <p><strong>Phone:</strong> {{ shop.phone }}</p>
  <p><strong>Address:</strong> {{ shop.address }}</p>
  <p><strong>Country:</strong> {{ shop.country }}</p>

  <!-- ✅ Display Products -->
  <h3>Products</h3>

          class="product-image"
        />
      </mat-card>
