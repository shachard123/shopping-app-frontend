<div class="auth-container">
  <mat-card>
    <mat-card-title>Sign Up</mat-card-title>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="signup()">
        <!-- Username -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput formControlName="username" required />
          <mat-error *ngIf="usernameControl?.invalid">
            {{ getUsernameErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <!-- Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" required />
          <mat-error *ngIf="passwordControl?.invalid">
            {{ getPasswordErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <!-- Confirm Password -->
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Confirm Password</mat-label>
          <input matInput type="password" formControlName="confirmPassword" required />
          <mat-error *ngIf="confirmPasswordControl?.invalid || form.hasError('passwordsMismatch')">
            {{ getConfirmPasswordErrorMessage() }}
          </mat-error>
        </mat-form-field>

        <!-- Submit -->
        <button mat-raised-button color="primary" class="full-width" type="submit" [disabled]="form.invalid">
          Sign Up
        </button>
      </form>

      <!-- General Error -->
      <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="redirect-text">
        Already have an account? <a routerLink="/auth/login">Login</a>
      </p>
    </mat-card-content>
  </mat-card>
</div>
